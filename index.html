<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>&#29233;&#24515;&#39029;&#38754;</title>
  <style>
    :root {
      --bg-top: #fff7fb;
      --bg-mid: #ffe3ee;
      --bg-bottom: #ffc7db;
      --heart-main: #ff3366;
      --heart-glow: rgba(255, 51, 102, 0.35);
      --text-main: #7a1636;
      --text-sub: rgba(122, 22, 54, 0.72);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      overflow: hidden;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.9), transparent 35%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 46%, var(--bg-bottom) 100%);
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      isolation: isolate;
    }

    .glow {
      position: absolute;
      width: min(78vw, 520px);
      aspect-ratio: 1;
      border-radius: 50%;
      background: radial-gradient(circle, var(--heart-glow) 0%, rgba(255, 51, 102, 0.06) 48%, transparent 70%);
      filter: blur(14px);
      animation: pulseGlow 2.6s ease-in-out infinite;
    }

    .heart-wrap {
      position: relative;
      display: grid;
      justify-items: center;
      gap: 22px;
      padding: 24px;
      z-index: 1;
    }

    .heart {
      position: relative;
      width: min(42vw, 220px);
      aspect-ratio: 1;
      transform: rotate(-45deg);
      background: linear-gradient(145deg, #ff7aa2 0%, var(--heart-main) 55%, #d91550 100%);
      border-radius: 18%;
      box-shadow:
        0 18px 50px rgba(217, 21, 80, 0.28),
        0 0 45px rgba(255, 94, 140, 0.3);
      animation: beat 1.15s ease-in-out infinite;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: inherit;
      border-radius: 50%;
    }

    .heart::before {
      top: -50%;
      left: 0;
    }

    .heart::after {
      top: 0;
      left: 50%;
    }

    .message {
      text-align: center;
      color: var(--text-main);
      text-shadow: 0 2px 10px rgba(255, 255, 255, 0.55);
    }

    .message h1 {
      margin: 0;
      font-size: clamp(28px, 6vw, 52px);
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .message p {
      margin: 10px 0 0;
      font-size: clamp(14px, 3.2vw, 20px);
      color: var(--text-sub);
      letter-spacing: 0.18em;
    }

    .mini-heart {
      position: absolute;
      bottom: -10vh;
      color: rgba(255, 51, 102, 0.56);
      font-size: clamp(14px, 3vw, 26px);
      animation: floatUp linear infinite;
      user-select: none;
      z-index: 0;
    }

    .mini-heart:nth-child(1) { left: 10%; animation-duration: 10s; animation-delay: -1s; }
    .mini-heart:nth-child(2) { left: 18%; animation-duration: 12s; animation-delay: -4s; }
    .mini-heart:nth-child(3) { left: 28%; animation-duration: 11s; animation-delay: -7s; }
    .mini-heart:nth-child(4) { left: 40%; animation-duration: 13s; animation-delay: -3s; }
    .mini-heart:nth-child(5) { left: 55%; animation-duration: 9s; animation-delay: -6s; }
    .mini-heart:nth-child(6) { left: 66%; animation-duration: 12s; animation-delay: -2s; }
    .mini-heart:nth-child(7) { left: 77%; animation-duration: 10s; animation-delay: -8s; }
    .mini-heart:nth-child(8) { left: 88%; animation-duration: 14s; animation-delay: -5s; }

    @keyframes beat {
      0%, 100% {
        transform: rotate(-45deg) scale(1);
      }
      14% {
        transform: rotate(-45deg) scale(1.08);
      }
      28% {
        transform: rotate(-45deg) scale(0.98);
      }
      42% {
        transform: rotate(-45deg) scale(1.12);
      }
      70% {
        transform: rotate(-45deg) scale(1);
      }
    }

    @keyframes pulseGlow {
      0%, 100% {
        transform: scale(0.92);
        opacity: 0.7;
      }
      50% {
        transform: scale(1.08);
        opacity: 1;
      }
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(0.9);
        opacity: 0;
      }
      12% {
        opacity: 1;
      }
      100% {
        transform: translateY(-120vh) scale(1.25);
        opacity: 0;
      }
    }

    @media (max-width: 600px) {
      .heart-wrap {
        gap: 18px;
      }

      .message p {
        letter-spacing: 0.12em;
      }
    }
  </style>
</head>
<body>
  <main class="scene" aria-label="heart page">
    <span class="mini-heart">&#10084;</span>
    <span class="mini-heart">&#10084;</span>
    <span class="mini-heart">&#10084;</span>
    <span class="mini-heart">&#10084;</span>
    <span class="mini-heart">&#10084;</span>
    <span class="mini-heart">&#10084;</span>
    <span class="mini-heart">&#10084;</span>
    <span class="mini-heart">&#10084;</span>

    <div class="glow" aria-hidden="true"></div>

    <section class="heart-wrap">
      <div class="heart" aria-hidden="true"></div>
      <div class="message">
        <h1>SB</h1>
        <p>笨笨狗</p>
      </div>
    </section>
  </main>
</body>
</html>
